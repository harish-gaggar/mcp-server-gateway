# OAuth providers for the "secure" (per-user OAuth) mode of the gateway.
#
# In this mode the gateway authenticates each user in the browser via Google,
# then hands the user's OIDC id_token to the upstream MCP server, which exchanges
# it for a short-lived, user-scoped JFrog access token. No shared power-token.
#
# Requires GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET to be set.

google:
  oidc: true
  issuer: https://accounts.google.com
  client_id: ${GOOGLE_OAUTH_CLIENT_ID}
  client_secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
  # "openid" is required so Google returns an id_token; "email" gives us a stable
  # user id and a claim JFrog can match in its identity mapping.
  scope:
    - openid
    - email
  # use the email claim as the user id (shows up in logs/metrics)
  user_id_claim: email
  extra_params:
    access_type: offline
    prompt: consent
