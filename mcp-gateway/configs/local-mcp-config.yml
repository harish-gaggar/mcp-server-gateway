# MCP backends reachable from the gateway.
# Servers without auth_provider are open on the local network (no OAuth required).

artifactory:
  name: artifactory
  description: JFrog Artifactory MCP server (local Docker)
  endpoint: http://artifactory-mcp:8091/mcp

