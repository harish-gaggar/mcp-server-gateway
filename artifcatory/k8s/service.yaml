apiVersion: v1
kind: Service
metadata:
  name: artifactory-mcp-server
  namespace: artifactory-mcp-server
  labels:
    app: artifactory-mcp-server
    component: mcp-server
spec:
  type: ClusterIP  # Internal service, not exposed externally
  selector:
    app: artifactory-mcp-server
  ports:
  - name: http
    port: 80           # Service port
    targetPort: 8080   # Container port
    protocol: TCP
  sessionAffinity: None

