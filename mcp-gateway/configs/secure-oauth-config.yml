# OAuth providers for secure (per-user) mode.
#
# Each MCP server namespace picks its auth_provider in secure-mcp-config.yml.
# The gateway blocks unauthenticated access (401 + OAuth discovery) and shows a
# consent screen before forwarding the user's token upstream.

google:
  oidc: true
  issuer: https://accounts.google.com
  client_id: ${GOOGLE_OAUTH_CLIENT_ID}
  client_secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
  scope:
    - openid
    - email
  user_id_claim: email
  extra_params:
    access_type: offline
    prompt: consent

github:
  oidc: false
  issuer: https://github.com
  client_id: ${GITHUB_OAUTH_CLIENT_ID}
  client_secret: ${GITHUB_OAUTH_CLIENT_SECRET}
  auth_url: https://github.com/login/oauth/authorize
  token_url: https://github.com/login/oauth/access_token
  supports_refresh: false
  # GitHub OAuth apps accept the classic (non-PKCE) flow; PKCE on the upstream
  # leg has caused 404 authorize pages for some apps.
  pkce: false
  scope:
    - read:user
    - public_repo
  user_info:
    url: https://api.github.com/user
    user_id_field: login
